<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IconMotion Studio AI</title>
<style>
body { font-family: Arial, sans-serif; margin:0; background:#111; color:#fff; }
header { padding:20px; text-align:center; background:#1e1e1e; }
.container { padding:20px; max-width:1000px; margin:auto; }
.controls { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:12px; }
.card { background:#222; padding:15px; border-radius:10px; }
#canvas {
  width:100%; height:420px; position:relative; overflow:hidden;
  background:#00FF00; border:3px solid #444; border-radius:12px;
}
.icon {
  position:absolute; font-size:42px; animation: float 4s ease-in-out infinite;
}
@keyframes float {
  0% { transform: translateY(0px) rotate(0deg);}
  50% { transform: translateY(-20px) rotate(10deg);}
  100% { transform: translateY(0px) rotate(0deg);}
}
button, select {
  width:100%; padding:10px; border-radius:8px; border:none;
}
footer { text-align:center; padding:16px; color:#bbb; }
</style>
</head>
<body>
<header>
<h1>IconMotion Studio AI</h1>
<p>Create animated icon scenes with Green Screen backgrounds.</p>
</header>

<div class="container">
  <div class="controls">
    <div class="card">
      <label>Background</label>
      <select id="bg">
        <option value="#00FF00">Green Screen</option>
        <option value="#FFFFFF">White</option>
        <option value="#000000">Black</option>
        <option value="#4F46E5">Indigo</option>
      </select>
    </div>
    <div class="card">
      <label>Template</label>
      <select id="template">
        <option>AI Tools</option>
        <option>Business</option>
        <option>Technology</option>
      </select>
    </div>
    <div class="card">
      <label>&nbsp;</label>
      <button onclick="generateIcons()">Generate Icons</button>
    </div>
  </div>

  <br>
  <div id="canvas"></div>
</div>

<footer>
Ready for GitHub Pages deployment. Export rendering can be added later using Remotion.
</footer>

<script>
const canvas = document.getElementById('canvas');
const bg = document.getElementById('bg');

bg.addEventListener('change', () => {
  canvas.style.background = bg.value;
});

function generateIcons() {
  canvas.innerHTML = '';
  const icons = ['🤖','☁️','💬','📊','⚙️','🛡️','🗄️','⚡','🧠','🔗'];

  icons.forEach((icon, i) => {
    const div = document.createElement('div');
    div.className = 'icon';
    div.textContent = icon;
    div.style.left = Math.random()*90 + '%';
    div.style.top = Math.random()*80 + '%';
    div.style.animationDuration = (2 + Math.random()*4) + 's';
    canvas.appendChild(div);
  });
}

generateIcons();
</script>
</body>
</html>
